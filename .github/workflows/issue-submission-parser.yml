name: "Parse Recipe Submission"

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  parse-submission:
    if: github.event.label.name == 'recipe-submission'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Save Issue Body to Temp File
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          echo "$ISSUE_BODY" > issue_body.md

      - name: Run Submission Parser
        run: |
          node ./scripts/parse-issue-submission.js issue_body.md
        continue-on-error: false

      - name: Clean temp file
        run: rm -f issue_body.md

      - name: Configure Git
        run: |
          git config --global user.name "WorkflowAI Bot"
          git config --global user.email "workflow-bot@workflowai.site"

      - name: Create Branch & Commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          BRANCH_NAME="submission/issue-${ISSUE_NUMBER}"
          git checkout -b "$BRANCH_NAME"
          git add src/content/workflows/ public/blueprints/imported/submissions/
          git commit -m "feat(submissions): add community recipe from issue #${ISSUE_NUMBER}"
          git push origin "$BRANCH_NAME" --force
          
          # Create Pull Request
          gh pr create \
            --title "feat(submissions): add community recipe from issue #${ISSUE_NUMBER}" \
            --body "Closes #${ISSUE_NUMBER}. This Pull Request was automatically generated by the recipe submission parser workflow." \
            --head "$BRANCH_NAME" \
            --base main
          
          # Comment on the issue
          gh issue comment "$ISSUE_NUMBER" --body "🚀 Success! Our automated pipeline has parsed your submission and created a Pull Request to merge your recipe into the site catalog."
